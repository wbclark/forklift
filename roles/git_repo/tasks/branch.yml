---
- name: "Configure repository branch"
  block:
    - name: "Configure repository branch remote"
      community.general.git_config:
        scope: local
        repo: "{{ git_repo_repository.dir }}/{{ git_repo_repository.name }}"
        name: "branch.{{ branch }}.remote"
        value: "{{ remote.name }}"
    - name: "Configure repository branch merge"
      community.general.git_config:
        scope: local
        repo: "{{ git_repo_repository.dir }}/{{ git_repo_repository.name }}"
        name: "branch.{{ branch }}.merge"
        value: "refs/heads/{{ branch }}"
