---
fedora36-hotfix-build:
  box: fedora36
  ssh_forward_agent: true
  ssh_username: wclark
  ssh_keys_only: false
  use_ssh_settings_vagrant_ssh_only: true
  multi_ansible:
    - 'ansible'
    - 'ansible_devuser'
  ansible:
    variables:
      unprivileged_user_username: wclark
      unprivileged_user_additional_groups: ["mock"]
      unprivileged_user_import_ssh_pub_key_github: wbclark
      inherit_kerberos_config: '/etc/krb5.conf'
      inherit_kerberos_ccache: '/tmp/krb5cc_wclark'
      inherit_kerberos_local_user_name: wclark
    verbose: true
    playbook:
      - 'playbooks/dev_user.yml'
  ansible_devuser:
    variables:
      ansible_user: wclark
      rcm_repository: 'http://download.devel.redhat.com/rel-eng/RCMTOOLS/latest-RCMTOOLS-2-F-$releasever/compose/Everything/$basearch/os/'
      hotfix_build_packages:
        - git
        - git-core
        - git-annex
        - bash-completion
        - make
        - make-devel
        - gcc
        - gcc-c++
        - libcurl
        - libcurl-devel
        - ruby-devel
        - rubygem-bundler
        - rubygem-unf
        - rubygem-unf_ext
        - rubygem-ffi
        - rubygem-byebug
        - curl-devel
        - openssl-devel
        - redhat-rpm-config
        - brewkoji
        - rpm-build
        - mock
        - crudini
        - python3-pip
        - python3-bugzilla
        - rpmdevtools
        - rpmlint
      git_repositories:
        - name: 'katello-host-tools'
          dir: '/home/wclark'
          remotes:
            - name: 'upstream'
              url: 'git@github.com:Katello/katello-host-tools.git'
              branches:
                - 'master'
        - name: 'pulp-rpm'
          dir: '/home/wclark'
          remotes:
            - name: 'upstream'
              url: 'git@github.com:pulp/pulp_rpm.git'
              branches:
                - 'main'
        - name: 'pulp-container'
          dir: '/home/wclark'
          remotes:
            - name: 'upstream'
              url: 'git@github.com:pulp/pulp_container.git'
              branches:
                - 'main'
        - name: 'pulpcore-packaging'
          dir: '/home/wclark'
          remotes:
            - name: 'downstream'
              url: 'git@gitlab.cee.redhat.com:satellite/pulpcore-packaging.git'
              branches:
                - 'PULPCORE-3.18'
          python_packages:
            - ansible
            - obal
            - tito
        - name: 'satellite-packaging'
          dir: '/home/wclark'
          remotes:
            - name: 'downstream'
              url: 'git@gitlab.cee.redhat.com:satellite/satellite-packaging.git'
              branches:
                - 'SATELLITE-STREAM'
                - 'SATELLITE-6.9.0'
                - 'SATELLITE-6.10.0'
                - 'SATELLITE-6.11.0'
          python_packages:
            - ansible
            - obal
            - tito
        - name: 'tool_belt'
          dir: '/home/wclark'
          remotes:
            - name: 'downstream'
              url: 'git@gitlab.cee.redhat.com:satellite/tool_belt.git'
              branches:
                - 'master'
          install_gems: true
        - name: 'katello'
          dir: '/home/wclark'
          remotes:
            - name: 'upstream'
              url: 'git@github.com:Katello/katello.git'
              branches:
                - 'master'
            - name: 'downstream'
              url: 'git@gitlab.cee.redhat.com:satellite/katello.git'
              branches:
                - 'SATELLITE-6.9.0'
                - 'SATELLITE-6.10.0'
                - 'SATELLITE-6.11.0'
        - name: 'foreman'
          dir: '/home/wclark'
          remotes:
            - name: 'upstream'
              url: 'git@github.com:theforeman/foreman.git'
              branches:
                - 'develop'
            - name: 'downstream'
              url: 'git@gitlab.cee.redhat.com:satellite/foreman.git'
              branches:
                - 'SATELLITE-6.9.0'
                - 'SATELLITE-6.10.0'
                - 'SATELLITE-6.11.0'
    verbose: true
    playbook:
      - 'playbooks/hotfix_build_env.yml'
      - 'user_playbooks/kakoune.yml'

centos8-stream-wclark-katello-devel:
  box: centos8-stream
  memory: 14336
  ssh_forward_agent: true
  ssh_username: wclark
  ssh_keys_only: false
  use_ssh_settings_vagrant_ssh_only: true
  multi_ansible:
    - 'ansible'
    - 'ansible_devuser'
  ansible:
    variables:
      unprivileged_user_username: wclark
      unprivileged_user_import_ssh_pub_key_github: wbclark
      inherit_kerberos_local_user_name: wclark
      inherit_kerberos_config: '/etc/krb5.conf'
      inherit_kerberos_ccache: '/tmp/krb5cc_wclark'
    verbose: true
    playbook:
      - 'playbooks/dev_user.yml'
  ansible_devuser:
    playbook:
      - 'user_playbooks/katello_repos.yml'
      - 'playbooks/katello_devel.yml'
      - 'user_playbooks/kakoune.yml'
    group: 'devel'
    verbose: true
    variables:
      ansible_user: wclark
      foreman_devel_github_push_ssh: true
      katello_devel_github_username: wbclark
      foreman_repositories_environment: staging
      katello_repositories_environment: staging
      katello_repositories_version: nightly
      katello_devel_user: wclark
      katello_devel_group: wclark
      foreman_installer_devel_scenario_user: wclark
      foreman_installer_devel_scenario_group: wclark
      foreman_installer_options:
        - "--foreman-proxy-content-enable-ostree=true"
        - "--foreman-proxy-content-enable-katello-agent=false"
        - "--katello-devel-npm-timeout=3600"
        - "--katello-devel-modulestream-nodejs=14"
        - "--katello-devel-foreman-manage-repo=false"
        - "--katello-devel-katello-manage-repo=false"
        - "-l info"
      katello_dev_additional_packages:
        - rubygem-bundler
        - ruby-devel
        - make
        - make-devel
        - gcc
        - gcc-c++
        - curl-devel
        - libcurl-devel
        - openssl-devel
        - redhat-rpm-config
        - postgresql-devel
        - qpid-proton-c
        - qpid-proton-c-devel
        - libvirt-devel
        - systemd-devel
        - libxml2-devel
        - git
        - bash-completion
      git_repositories:
        - name: 'katello'
          dir: '/home/wclark'
          remotes:
            - name: 'wbclark'
              url: 'git@github.com:wbclark/katello.git'
              branches:
                - 'master'
            - name: 'upstream'
              url: 'git@github.com:Katello/katello.git'
          install_gems: true
        - name: 'foreman'
          dir: '/home/wclark'
          remotes:
            - name: 'wbclark'
              url: 'git@github.com:wbclark/foreman.git'
              branches:
                - 'develop'
            - name: 'upstream'
              url: 'git@github.com:theforeman/foreman.git'
          install_gems: true

